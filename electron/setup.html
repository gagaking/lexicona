<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>辞谱 Lexicona - 环境初始化</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#FCFBF9;color:#1E1E1E;display:flex;align-items:center;justify-content:center;height:100vh;user-select:none;-webkit-app-region:drag}
.container{text-align:center;padding:40px 48px;width:460px}
h1{font-family:serif;font-size:26px;font-weight:400;color:#1E1E1E;margin-bottom:2px;letter-spacing:3px}
.subtitle{font-size:12px;color:#9A9A9A;margin-bottom:28px}
.status{font-size:13px;color:#555;min-height:48px;line-height:1.6;margin-bottom:20px;word-break:break-word}
.status.error{color:#C53030}
.status.success{color:#276749}
.progress-bar{width:100%;height:4px;background:#E8E6E1;border-radius:2px;overflow:hidden;margin-bottom:28px}
.progress-fill{height:100%;width:0%;background:#1E1E1E;border-radius:2px;transition:width .3s ease}
.btn{display:inline-block;padding:9px 28px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:#1E1E1E;color:#fff;border-radius:0;font-family:inherit;transition:background .15s;-webkit-app-region:no-drag}
.btn:hover{background:#000}
.btn.secondary{background:#E8E6E1;color:#1E1E1E;margin-left:8px}
.btn.secondary:hover{background:#D6D4CF}
.btn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="container">
<h1>辞谱 Lexicona</h1>
<p class="subtitle">首次使用需初始化深度学习环境</p>
<div id="status" class="status">正在检查环境...</div>
<div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
<div id="actions" style="display:none">
<button id="startBtn" class="btn">启动应用</button>
<button id="retryBtn" class="btn secondary">重试</button>
<button id="skipBtn" class="btn secondary">跳过</button>
</div>
</div>
<script>
var e=window.electronAPI;
var s=document.getElementById('status'),p=document.getElementById('progress'),a=document.getElementById('actions');
var sb=document.getElementById('startBtn'),rb=document.getElementById('retryBtn'),kb=document.getElementById('skipBtn');
e.onSetupProgress(function(d){
s.textContent=d.message;
p.style.width=(d.progress*100)+'%';
if(d.step==='error'){s.className='status error';a.style.display='block';sb.style.display='none';rb.style.display='inline-block';kb.style.display='inline-block'}
else if(d.step==='done'){s.className='status success';a.style.display='block';sb.style.display='inline-block';rb.style.display='none';kb.style.display='none';sb.focus()}
});
function run(){e.checkSetup().then(function(n){if(n){s.textContent='正在准备环境...';return e.runSetup()}else{s.textContent='环境已就绪！';p.style.width='100%';a.style.display='block';sb.style.display='inline-block';rb.style.display='none';kb.style.display='none';sb.focus()}}).catch(function(err){s.textContent='初始化失败: '+(err.message||err);s.className='status error';a.style.display='block';sb.style.display='none';rb.style.display='inline-block';kb.style.display='inline-block'})}
sb.onclick=function(){sb.disabled=true;sb.textContent='启动中...';e.startApp()};
rb.onclick=function(){rb.style.display='none';s.className='status';s.textContent='正在重试...';p.style.width='0%';run()};
kb.onclick=function(){e.startApp()};
run();
</script>
</body>
</html>
